name = "r2-proxy"
main = "index.js"
compatibility_date = "2024-09-01"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "subasha-ventures"

[vars]
SUPABASE_URL = "https://wbwmovtewytjibxutssk.supabase.co"
WORKER_ENV = "production"
R2_PUBLIC_DOMAIN = "https://r2-proxy.mysubasha.com"

# Secrets — set via wrangler CLI, never in this file:
# wrangler secret put SUPABASE_ANON_KEY
# wrangler secret put R2_ACCOUNT_ID         (for presigned URL generation via S3 API)
# wrangler secret put R2_ACCESS_KEY_ID      (R2 API token)
# wrangler secret put R2_SECRET_ACCESS_KEY  (R2 API token secret)

[[routes]]
pattern = "r2-proxy.mysubasha.com/*"
zone_name = "mysubasha.com"
