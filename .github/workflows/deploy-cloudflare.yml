name: Deploy SubashaVentures Blazor WASM

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  # Always update project structure on every push
  update-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Project Structure
        run: |
          mkdir -p "Others"
          {
            echo "Project Structure Documentation - SubashaVentures"
            echo "Generated: $(date -u)"
            echo "Repository: ${{ github.repository }}"
            echo "Commit: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "=================================="
            echo
            echo "Source Files:"
            find . -type f \( -name "*.cs" -o -name "*.razor" -o -name "*.csproj" -o -name "*.sln" -o -name "*.json" -o -name "*.css" -o -name "*.scss" -o -name "*.js" -o -name "*.html" -o -name "*.md" -o -name "*.yml" \) \
              -not -path "*/bin/*" -not -path "*/obj/*" -not -path "*/.git/*" -not -path "*/node_modules/*" | sed 's|^\./||' | sort
            echo
            echo "Directory Structure:"
            find . -type d -not -path "*/bin" -not -path "*/bin/*" -not -path "*/obj" -not -path "*/obj/*" -not -path "*/.git" -not -path "*/.git/*" -not -path "*/node_modules" -not -path "*/node_modules/*" | sed 's|^\./||' | sort
            echo
            echo "File Count Summary:"
            for ext in cs razor csproj sln json css js html; do
              count=$(find . -name "*.$ext" -not -path "*/bin/*" -not -path "*/obj/*" -not -path "*/.git/*" | wc -l)
              [ "$count" -gt 0 ] && printf "%-10s: %d files\n" ".$ext" "$count"
            done
          } > "Others/ProjectStructure.txt"

      - name: Commit Updated Project Structure
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - SubashaVentures"
          if [ -f "Others/ProjectStructure.txt" ]; then
            if ! git diff --quiet "Others/ProjectStructure.txt" 2>/dev/null; then
              git add "Others/ProjectStructure.txt"
              git commit -m "Auto-update project structure [skip ci]"
              git push
            fi
          fi

  # Build and deploy to Cloudflare Pages
  build-and-deploy-cloudflare:
    runs-on: ubuntu-latest
    needs: update-structure
    if: |
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      (contains(github.event.head_commit.message, '--cloudflare') ||
       contains(github.event.head_commit.message, '--CLOUDFLARE'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Project
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ./dist

      - name: Prepare deployment files
        run: |
          mkdir -p ./pages

          if [ -d "./dist/wwwroot" ]; then
            cp -r ./dist/wwwroot/* ./pages/
            echo "✅ wwwroot copied"
          else
            echo "❌ wwwroot not found"
            exit 1
          fi

          # Cloudflare Pages uses root-relative paths — base href is just /
          sed -i 's|<base href="[^"]*" />|<base href="/" />|g' ./pages/index.html

          # 404.html for SPA client-side routing
          cp ./pages/index.html ./pages/404.html

          # Fix service worker path (root relative for custom domain)
          sed -i "s|register('[^']*service-worker\.js')|register('/service-worker.js')|g" ./pages/index.html
          sed -i "s|register('[^']*service-worker\.js')|register('/service-worker.js')|g" ./pages/404.html

          echo "✅ Files prepared for Cloudflare Pages"

      - name: Verify deployment files
        run: |
          echo "📋 Critical files:"
          echo "  index.html: $([ -f ./pages/index.html ] && echo '✅' || echo '❌')"
          echo "  404.html:   $([ -f ./pages/404.html ] && echo '✅' || echo '❌')"
          echo ""
          echo "📦 Framework check:"
          [ -d ./pages/_framework ] && echo "  _framework: ✅" || { echo "  _framework: ❌"; exit 1; }
          WASM_COUNT=$(find ./pages/_framework -name "*.wasm" | wc -l)
          echo "  WASM files: $WASM_COUNT"
          echo ""
          echo "🔍 base href:"
          grep '<base href=' ./pages/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./pages --project-name=mysubasha --branch=main

      - name: Deployment Summary
        run: |
          echo "======================================"
          echo "🚀 CLOUDFLARE DEPLOYMENT SUCCESSFUL!"
          echo "======================================"
          echo ""
          echo "📍 Your app is live at: https://mysubasha.com"
          echo ""
          echo "🔐 Post-deploy checklist:"
          echo "   1. Supabase → Auth → Site URL: https://mysubasha.com"
          echo "   2. Supabase → Auth → Redirect URLs: https://mysubasha.com/**"
          echo "   3. Google OAuth → Authorized Origins: https://mysubasha.com"
          echo "   4. Firebase → Authorized domains: mysubasha.com"
          echo "======================================"

  # Skipped message
  deployment-skipped:
    runs-on: ubuntu-latest
    needs: update-structure
    if: |
      !(contains(github.event.head_commit.message, '--cloudflare') ||
        contains(github.event.head_commit.message, '--CLOUDFLARE'))
    steps:
      - name: Deployment Skipped
        run: |
          echo "======================================"
          echo "ℹ️  DEPLOYMENT SKIPPED"
          echo "======================================"
          echo "To deploy to Cloudflare Pages, include --cloudflare in your commit message"
          echo ""
          echo "Examples:"
          echo "  git commit -m 'Fix auth flow --cloudflare'"
          echo "  git commit -m 'v1.1.0 --cloudflare'"
          echo ""
          echo "Current commit: ${{ github.event.head_commit.message }}"
          echo "======================================"
