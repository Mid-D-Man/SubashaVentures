name: Deploy SubashaVentures Blazor WASM to Cloudflare Pages

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:

  # ── 1. Parse deploy trigger ─────────────────────────────────────────────────
  parse-trigger:
    runs-on: ubuntu-latest
    outputs:
      run_deploy: ${{ steps.decide.outputs.run_deploy }}
    steps:
      - name: Decide whether to deploy
        id: decide
        run: |
          RUN=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN=true
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            MSG="${{ github.event.pull_request.title }}"
            echo "$MSG" | grep -qiE '\-\-cloudflare\b' && RUN=true || true
          else
            MSG="${{ github.event.head_commit.message }}"
            echo "$MSG" | grep -qiE '\-\-cloudflare\b' && RUN=true || true
          fi

          echo "run_deploy=$RUN" >> $GITHUB_OUTPUT
          echo "Run deploy : $RUN"
          echo "Event      : ${{ github.event_name }}"
          echo "Branch     : ${{ github.ref_name }}"

  # ── 2. Build and deploy ─────────────────────────────────────────────────────
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: parse-trigger
    if: needs.parse-trigger.outputs.run_deploy == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore Dependencies
        run: |
          echo "=== Restoring NuGet packages ==="
          dotnet restore

      - name: Build Project
        run: |
          echo "=== Building SubashaVentures ==="
          dotnet build --configuration Release --no-restore

      - name: Publish
        run: |
          echo "=== Publishing Blazor WASM ==="
          dotnet publish --configuration Release --no-build --output ./dist

      - name: Prepare deployment files
        run: |
          echo "=== Preparing deployment files ==="
          mkdir -p ./pages

          if [ -d "./dist/wwwroot" ]; then
            cp -r ./dist/wwwroot/* ./pages/
            echo "✅ wwwroot contents copied"
          else
            echo "❌ ERROR: wwwroot not found"
            exit 1
          fi

          # Cloudflare Pages + custom domain = root-relative, base href is /
          sed -i 's|<base href="[^"]*" />|<base href="/" />|g' ./pages/index.html
          echo "✅ base href set to /"

          # 404.html for SPA client-side routing on Cloudflare Pages
          cp ./pages/index.html ./pages/404.html
          echo "✅ 404.html created for SPA routing"

          # Fix service worker registration to root-relative path
          sed -i "s|register('[^']*service-worker\.js')|register('/service-worker.js')|g" ./pages/index.html
          sed -i "s|register('[^']*service-worker\.js')|register('/service-worker.js')|g" ./pages/404.html
          echo "✅ Service worker path set to /service-worker.js"

      - name: Verify deployment files
        run: |
          echo "=== Verifying deployment ==="

          echo "📋 Critical files:"
          echo "  index.html : $([ -f ./pages/index.html ] && echo '✅' || echo '❌')"
          echo "  404.html   : $([ -f ./pages/404.html ]   && echo '✅' || echo '❌')"

          echo ""
          echo "📦 Framework check:"
          if [ -d ./pages/_framework ]; then
            echo "  _framework directory : ✅"
            WASM_COUNT=$(find ./pages/_framework -name "*.wasm" 2>/dev/null | wc -l)
            DLL_COUNT=$(find  ./pages/_framework -name "*.dll"  2>/dev/null | wc -l)
            JS_COUNT=$(find   ./pages/_framework -name "*.js"   2>/dev/null | wc -l)
            echo "  WASM files : $WASM_COUNT $([ $WASM_COUNT -gt 0 ] && echo '✅' || echo '❌')"
            echo "  DLL  files : $DLL_COUNT  $([ $DLL_COUNT  -gt 0 ] && echo '✅' || echo '❌')"
            echo "  JS   files : $JS_COUNT   $([ $JS_COUNT   -gt 0 ] && echo '✅' || echo '❌')"
          else
            echo "  _framework directory : ❌ NOT FOUND"
            exit 1
          fi

          echo ""
          echo "📊 Deployment size:"
          du -sh ./pages | cut -f1

          echo ""
          echo "📈 Largest files:"
          find ./pages -type f -exec du -h {} + | sort -rh | head -10

          echo ""
          echo "🔍 base href verification:"
          grep '<base href=' ./pages/index.html

          echo ""
          echo "🔧 Service worker verification:"
          grep 'service-worker' ./pages/index.html || echo "⚠️ service worker registration not found"

      - name: Setup Node (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Pages project if it does not exist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Ensuring Pages project exists ==="
          # This will succeed silently if the project already exists
          npx wrangler pages project create subashaventures-pages \
            --production-branch=main 2>&1 || echo "Project already exists or creation skipped, continuing"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Deploying to Cloudflare Pages ==="

          # WRANGLER_CONFIG_PATH=/dev/null stops wrangler picking up
          # any wrangler.toml / wrangler.jsonc sitting in the repo root
          # (those belong to other projects and cause the Pages API mismatch)
          WRANGLER_CONFIG_PATH=/dev/null npx wrangler pages deploy ./pages \
            --project-name=subashaventures-pages \
            --branch=main \
            --commit-dirty=true

      - name: Deployment Summary
        run: |
          echo "======================================"
          echo "🚀 CLOUDFLARE DEPLOYMENT SUCCESSFUL!"
          echo "======================================"
          echo ""
          echo "📍 Live at:"
          echo "   https://mysubasha.com"
          echo "   https://www.mysubasha.com"
          echo ""
          echo "🔐 Post-deploy checklist (one-time):"
          echo ""
          echo "   Cloudflare Pages (subashaventures-pages) → Custom domains:"
          echo "     Add: mysubasha.com"
          echo "     Add: www.mysubasha.com"
          echo ""
          echo "   Supabase → Auth → URL Configuration:"
          echo "     Site URL     : https://mysubasha.com"
          echo "     Redirect URLs: https://mysubasha.com/**"
          echo "                    https://www.mysubasha.com/**"
          echo ""
          echo "   Google Cloud Console → OAuth Client:"
          echo "     Authorized JS Origins : https://mysubasha.com"
          echo "     Redirect URI (no change):"
          echo "       https://wbwmovtewytjibxutssk.supabase.co/auth/v1/callback"
          echo ""
          echo "   Firebase Console → Authentication → Authorized domains:"
          echo "     Add: mysubasha.com"
          echo "     Add: www.mysubasha.com"
          echo "======================================"

  # ── 3. Summary ──────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [ parse-trigger, build-and-deploy ]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "================================================="
          echo "  SubashaVentures — Deploy Summary"
          echo "================================================="
          echo "Build   : #${{ github.run_number }}"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Trigger : ${{ github.event_name }}"
          echo "Deploy  : ${{ needs.build-and-deploy.result || 'skipped' }}"
          echo ""
          if [ "${{ needs.parse-trigger.outputs.run_deploy }}" != "true" ]; then
            echo "ℹ️  Deployment skipped."
            echo ""
            echo "   To deploy to Cloudflare Pages, add --cloudflare"
            echo "   to your commit message:"
            echo ""
            echo "   git commit -m 'your message --cloudflare'"
            echo "   git commit -m 'fix auth flow --cloudflare'"
            echo "   git commit -m 'v1.1.0 --cloudflare'"
            echo ""
            echo "   Or trigger manually: Actions → Deploy → Run workflow"
          fi
          echo "================================================="
